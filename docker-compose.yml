services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datacole_ci3_web
    ports:
      - "8079:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mariadb:10.3
    container_name: datacole_ci3_db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=datacole
      - MYSQL_USER=datacole
      - MYSQL_PASSWORD=datacole123
    volumes:
      - ./db:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    restart: unless-stopped
